<!DOCTYPE html>
<html>
<head>
    <title>ML Prediction</title>
</head>
<body>

<h2>Passenger Survival Prediction</h2>

<form id="form">
    Pclass: <input type="number" id="Pclass"><br><br>
    Age: <input type="number" id="Age"><br><br>
    SibSp: <input type="number" id="SibSp"><br><br>
    Parch: <input type="number" id="Parch"><br><br>
    Fare: <input type="number" id="Fare"><br><br>

    <button type="submit">Predict</button>
</form>

<h3 id="result"></h3>

<script>
document.getElementById("form").addEventListener("submit", async function(e) {
    e.preventDefault();

    const data = {
        Pclass: Number(document.getElementById("Pclass").value),
        Age: Number(document.getElementById("Age").value),
        SibSp: Number(document.getElementById("SibSp").value),
        Parch: Number(document.getElementById("Parch").value),
        Fare: Number(document.getElementById("Fare").value)
    };

    const response = await fetch("http://127.0.0.1:8000/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    });

    const result = await response.json();

    document.getElementById("result").innerText = 
        "Prediction: " + result.prediction;
});
</script>

</body>
</html>
